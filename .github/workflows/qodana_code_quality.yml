ame: Qodana Configuration Upload

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  upload-qodana-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # TODO(qodana): Add qodana-global-configurations.yaml (Qodana Cloud global configurations)
      # so this job can upload org-wide configuration to https://qodana.cloud.
      # For now, skip gracefully when the file is not present.
      - name: Run Qodana Configuration Uploader
        if: ${{ hashFiles('qodana-global-configurations.yaml') != '' }}
        env:
          QODANA_CONFIGURATIONS_TOKEN: ${{ secrets.QODANA_CONFIGURATIONS_TOKEN }}
        run: |
          docker run --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            -e QODANA_CONFIGURATIONS_TOKEN=$QODANA_CONFIGURATIONS_TOKEN \
            jetbrains/qodana-configuration-uploader:latest \
            --global-configs-file qodana-global-configurations.yaml \
            --qodana-host https://qodana.cloud