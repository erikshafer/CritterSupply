name: CI

# CI runs on every PR and push to main — but only when code or build config changes.
# E2E tests run in parallel via their own workflow (e2e.yml), also triggered on PRs.
#
# Jobs (this workflow):
#   build             — restores + builds the solution once, uploads build output
#   unit-tests        — downloads build output and runs all *.UnitTests projects
#   integration-tests — downloads build output and runs API integration tests (Testcontainers)
#
# Parallel workflow (e2e.yml):
#   storefront-e2e    — Playwright browser tests for Storefront (Blazor Server)
#   vendor-portal-e2e — Playwright browser tests for Vendor Portal (Blazor WASM)
#
# The build job runs first; unit-tests and integration-tests fan out in parallel
# after it completes.  This eliminates a redundant full solution build and saves
# runner minutes.  E2E jobs (separate workflow) still build independently because
# cross-workflow artifact sharing adds too much complexity for the benefit.

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/dotnet.yml'
      - '*.props'
      - '*.slnx'
      - 'docker-compose.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/dotnet.yml'
      - '*.props'
      - '*.slnx'
      - 'docker-compose.yml'

# Cancel in-progress runs for the same branch/PR to avoid wasted runner time.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Build ──────────────────────────────────────────────────────────────────
  # Restores NuGet packages and builds the entire solution once in Release mode.
  # The compiled output (bin/Release) is uploaded as an artifact so downstream
  # test jobs can skip the build step entirely.
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release
        env:
          # Prevent Playwright browser download during build (E2E projects).
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ github.run_number }}
          path: |
            **/bin/Release/
          retention-days: 1
          compression-level: 6

  # ─── Unit Tests ─────────────────────────────────────────────────────────────
  # Fast feedback: downloads the shared build output and runs all *.UnitTests
  # projects (including bUnit component tests).
  # No Docker infrastructure required — pure in-process xUnit tests.
  unit-tests:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output-${{ github.run_number }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run Unit Tests
        run: |
          exit_code=0
          while IFS= read -r -d '' project; do
            name=$(basename "$project" .csproj)
            echo "::group::$name"
            dotnet test "$project" \
              --no-build \
              --configuration Release \
              --logger "console;verbosity=normal" \
              --logger "trx;LogFileName=${name}-results.trx" || exit_code=$?
            echo "::endgroup::"
          done < <(find tests -name "*.UnitTests.csproj" -print0)
          exit $exit_code

      - name: Upload Unit Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ github.run_number }}
          path: '**/TestResults/**/*.trx'
          retention-days: 30

  # ─── Integration Tests ───────────────────────────────────────────────────────
  # Downloads the shared build output and runs all *.IntegrationTests projects.
  # Each test fixture spins up its own isolated PostgreSQL container via
  # Testcontainers (no shared docker-compose infrastructure needed).
  # External Wolverine transports (RabbitMQ) are disabled in every fixture.
  integration-tests:
    name: Integration Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output-${{ github.run_number }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Pre-pull the PostgreSQL image used by all TestContainers test fixtures.
      # This avoids each test fixture pulling independently and reduces flaky
      # timeouts on slow Docker Hub responses.
      - name: Pre-pull TestContainers PostgreSQL image
        run: docker pull postgres:18-alpine

      - name: Run Integration Tests
        run: |
          exit_code=0
          while IFS= read -r -d '' project; do
            name=$(basename "$project" .csproj)
            echo "::group::$name"
            dotnet test "$project" \
              --no-build \
              --configuration Release \
              --logger "console;verbosity=normal" \
              --logger "trx;LogFileName=${name}-results.trx" || exit_code=$?
            echo "::endgroup::"
          done < <(find tests -name "*.IntegrationTests.csproj" -print0)
          exit $exit_code
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
          TESTCONTAINERS_RYUK_DISABLED: false

      - name: Upload Integration Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-${{ github.run_number }}
          path: '**/TestResults/**/*.trx'
          retention-days: 30
