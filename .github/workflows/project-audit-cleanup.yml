name: Project Audit Cleanup (One-Time)

# One-time workflow to clean up GitHub Project 9 based on the audit
# documented in docs/planning/github-project-9-audit.md
#
# Actions performed when triggered:
#   A1: Close 37 "Label Drift Detected" noise issues (#258-#301 subset)
#   A2: Close 14 Cycle 22 shipped-work issues
#   B1: Close milestones: Cycle 22, Cycle 25, Cycle 26 (all complete)
#   B2: Create Cycle 27 milestone (CLOSED — already delivered)
#   B2: Create Cycle 28 milestone (OPEN — next planned cycle)
#   C1: Create 6 Cycle 28 planning issues (Notifications BC Phase 1)
#   C2: Create 5 Cycle 29 planning issues (Promotions BC Phase 1)
#
# Trigger manually via GitHub UI:
#   Actions → "Project Audit Cleanup (One-Time)" → Run workflow

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print what would be done without making changes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  audit-cleanup:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      DRY_RUN: ${{ github.event.inputs.dry_run }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================================================================
      # A1: Close 37 "Label Drift Detected" noise issues
      # A2: Close 14 Cycle 22 shipped-work issues
      # =========================================================================
      - name: A1 + A2 — Close noise and shipped-work issues
        run: |
          close_issue() {
            local issue="$1"
            local reason="$2"
            local comment="$3"

            local state
            state=$(gh issue view "$issue" --repo "$REPO" --json state --jq '.state' 2>/dev/null || echo "NOT_FOUND")

            if [ "$state" = "CLOSED" ]; then
              echo "  #${issue}: already closed — skipping"
              return
            fi

            if [ "$state" = "NOT_FOUND" ]; then
              echo "  #${issue}: not found — skipping"
              return
            fi

            if [ "$DRY_RUN" = "true" ]; then
              echo "  [DRY RUN] Would close #${issue} (reason: ${reason})"
              return
            fi

            if gh issue close "$issue" \
                --repo "$REPO" \
                --comment "$comment" \
                --reason "$reason"; then
              echo "  ✅ Closed #${issue}"
            else
              echo "  ⚠️  Failed to close #${issue}"
            fi
          }

          # --- A1: Label Drift noise issues ---
          echo "=== A1: Closing Label Drift noise issues ==="
          DRIFT_COMMENT="Closing as automated noise. These issues were generated by the label-drift detection workflow because \`scripts/github-migration/01-labels.sh\` was missing. That script has now been added with all canonical labels (including the 5 previously-unlisted ones). See: docs/planning/github-project-9-audit.md Part A1."

          for ISSUE in 258 259 260 261 262 263 264 265 266 267 268 269 \
                       274 275 276 277 278 279 280 281 282 283 284 285 \
                       290 291 292 293 294 295 296 297 298 299 300 301; do
            close_issue "$ISSUE" "not planned" "$DRIFT_COMMENT"
          done

          # --- A2: Cycle 22 shipped-work issues ---
          echo ""
          echo "=== A2: Closing Cycle 22 shipped-work issues ==="
          CYCLE22_COMMENT="Delivered in Cycle 22 (Vendor Portal + Vendor Identity Phase 1). All 6 phases complete, 143 integration tests passing. Issues were created during the GitHub migration effort but never used for day-to-day tracking. Closing retroactively. See: docs/planning/cycles/cycle-22-retrospective.md and docs/planning/github-project-9-audit.md Part A2."

          for ISSUE in 256 257 270 271 272 273 286 287 288 289 302 303 304 305; do
            close_issue "$ISSUE" "completed" "$CYCLE22_COMMENT"
          done

      # =========================================================================
      # B1: Close completed milestones
      # B2: Create Cycle 27 (closed) and Cycle 28 (open) milestones
      # =========================================================================
      - name: B1 + B2 — Manage milestones
        run: |
          close_milestone() {
            local title="$1"
            local number
            number=$(gh api "/repos/${REPO}/milestones?state=open&per_page=100" \
              --jq ".[] | select(.title == \"${title}\") | .number" 2>/dev/null || echo "")

            if [ -z "$number" ]; then
              echo "  '${title}': not found as open — already closed or doesn't exist"
              return
            fi

            if [ "$DRY_RUN" = "true" ]; then
              echo "  [DRY RUN] Would close milestone '${title}' (#${number})"
              return
            fi

            if gh api "/repos/${REPO}/milestones/${number}" \
                --method PATCH --field state=closed --silent; then
              echo "  ✅ Closed milestone '${title}' (#${number})"
            else
              echo "  ⚠️  Failed to close milestone '${title}'"
            fi
          }

          upsert_milestone() {
            local title="$1"
            local description="$2"
            local due_on="$3"   # ISO date or empty string
            local state="$4"    # open or closed

            local existing
            existing=$(gh api "/repos/${REPO}/milestones?state=all&per_page=100" \
              --jq ".[] | select(.title == \"${title}\") | .number" 2>/dev/null || echo "")

            if [ -n "$existing" ]; then
              echo "  '${title}' already exists (#${existing}) — ensuring state=${state}"
              if [ "$DRY_RUN" != "true" ]; then
                gh api "/repos/${REPO}/milestones/${existing}" \
                  --method PATCH --field state="$state" --silent || true
              fi
              return
            fi

            if [ "$DRY_RUN" = "true" ]; then
              echo "  [DRY RUN] Would create milestone '${title}' (state=${state})"
              return
            fi

            local args=(--method POST
              --field "title=${title}"
              --field "description=${description}"
              --field "state=${state}")
            [ -n "$due_on" ] && args+=(--field "due_on=${due_on}")

            local number
            number=$(gh api "/repos/${REPO}/milestones" \
              "${args[@]}" --jq '.number' 2>/dev/null || echo "")

            if [ -n "$number" ]; then
              echo "  ✅ Created milestone '${title}' (#${number}, state=${state})"
            else
              echo "  ⚠️  Failed to create milestone '${title}'"
            fi
          }

          # B1: Close completed milestones
          echo "=== B1: Closing completed cycle milestones ==="
          close_milestone "Cycle 22: Vendor Portal Phase 1"
          close_milestone "Cycle 25: Returns BC Phase 1"
          close_milestone "Cycle 26: Returns BC Phase 2"

          # B2: Create Cycle 27 (closed — already delivered)
          echo ""
          echo "=== B2: Creating Cycle 27 milestone (closed) ==="
          upsert_milestone \
            "Cycle 27: Returns BC Phase 3" \
            "Returns BC Phase 3 — Exchange workflow (UC-11), CE SignalR handlers, sequential returns, cross-BC smoke tests" \
            "2026-03-13T23:59:59Z" \
            "closed"

          # B2: Create Cycle 28 (open — next planned cycle)
          echo ""
          echo "=== B2: Creating Cycle 28 milestone (open) ==="
          upsert_milestone \
            "Cycle 28: Notifications BC Phase 1" \
            "Notifications BC Phase 1 — Transactional email for OrderPlaced, ShipmentDispatched, and all 7 Returns lifecycle events" \
            "" \
            "open"

      # =========================================================================
      # C1 + C2: Create planning issues for Cycle 28 and Cycle 29
      # =========================================================================
      - name: C1 + C2 — Create Cycle 28 and Cycle 29 planning issues
        run: |
          create_issue() {
            local title="$1"
            local labels="$2"
            local milestone_prefix="$3"
            local body="$4"

            # Skip if an issue with the same title already exists (open or closed)
            local existing
            existing=$(gh issue list \
              --repo "$REPO" \
              --state all \
              --search "\"${title}\" in:title" \
              --json number \
              --jq '.[0].number' 2>/dev/null || echo "")

            if [ -n "$existing" ]; then
              echo "  Issue already exists (#${existing}): ${title} — skipping"
              return
            fi

            if [ "$DRY_RUN" = "true" ]; then
              echo "  [DRY RUN] Would create: ${title}"
              return
            fi

            local milestone_number
            milestone_number=$(gh api "/repos/${REPO}/milestones?state=all&per_page=100" \
              --jq ".[] | select(.title | startswith(\"${milestone_prefix}\")) | .number" \
              2>/dev/null | head -1 || echo "")

            local args=(--repo "$REPO" --title "$title" --label "$labels" --body "$body")
            [ -n "$milestone_number" ] && args+=(--milestone "$milestone_number")

            local number
            number=$(gh issue create "${args[@]}" --json number --jq '.number' 2>/dev/null || echo "")

            if [ -n "$number" ]; then
              echo "  ✅ Created #${number}: ${title}"
            else
              echo "  ⚠️  Failed to create: ${title}"
            fi
          }

          # --- C1: Cycle 28 — Notifications BC Phase 1 ---
          echo "=== C1: Creating Cycle 28 planning issues ==="

          create_issue \
            "[Notifications BC] Create domain + API project structure" \
            "bc:notifications,type:feature,status:planned" \
            "Cycle 28:" \
            "Create the Notifications bounded context:

          - \`src/Notifications/Notifications/\` — domain project
          - \`src/Notifications/Notifications.Api/\` — API project (port 5248)
          - Add both projects to \`CritterSupply.slnx\`
          - Configure Marten + Wolverine + RabbitMQ subscriptions
          - Docker Compose service entry

          **Cycle:** 28 — Notifications BC Phase 1
          **Prerequisite:** Cycles 25-27 (Returns BC) ✅ COMPLETE"

          create_issue \
            "[Notifications BC] Phase 1a: OrderPlaced email handler" \
            "bc:notifications,type:feature,status:planned" \
            "Cycle 28:" \
            "Subscribe to \`OrderPlaced\` integration event (published by Orders BC) and send a transactional order confirmation email.

          **Acceptance criteria:**
          - Handler receives \`OrderPlaced\` from RabbitMQ
          - Email rendered with order summary (order ID, items, total, shipping address)
          - Stub email provider used in development (logs to console)
          - Integration test verifies handler invocation

          **Cycle:** 28 — Notifications BC Phase 1"

          create_issue \
            "[Notifications BC] Phase 1a: ShipmentDispatched email handler" \
            "bc:notifications,type:feature,status:planned" \
            "Cycle 28:" \
            "Subscribe to \`ShipmentDispatched\` integration event (published by Fulfillment BC) and send a shipment notification email.

          **Acceptance criteria:**
          - Handler receives \`ShipmentDispatched\` from RabbitMQ
          - Email rendered with tracking number, carrier, estimated delivery
          - Stub email provider used in development
          - Integration test verifies handler invocation

          **Cycle:** 28 — Notifications BC Phase 1"

          create_issue \
            "[Notifications BC] Phase 1b: Returns lifecycle email handlers (7 events)" \
            "bc:notifications,type:feature,status:planned" \
            "Cycle 28:" \
            "Subscribe to all 7 Returns lifecycle events and send appropriate customer-facing emails.

          **Events to handle:**
          - \`ReturnRequested\` — confirmation email
          - \`ReturnApproved\` — approval + instructions email
          - \`ReturnDenied\` — denial email with reason
          - \`ReturnReceived\` — item received confirmation
          - \`ReturnCompleted\` — refund/exchange processed confirmation
          - \`ReturnRejected\` — rejection email with explanation
          - \`ReturnExpired\` — expiry notification

          **Cycle:** 28 — Notifications BC Phase 1"

          create_issue \
            "[Notifications BC] Write integration tests for Notifications BC" \
            "bc:notifications,type:testing,status:planned" \
            "Cycle 28:" \
            "Integration tests for the Notifications BC using Alba + TestContainers.

          **Test coverage:**
          - Each email handler correctly processes its event
          - Stub email provider captures sent emails for assertion
          - RabbitMQ subscription wiring verified

          **Cycle:** 28 — Notifications BC Phase 1"

          create_issue \
            "[Infrastructure] Add email provider integration (SMTP/SendGrid stub)" \
            "bc:infrastructure,type:feature,status:planned" \
            "Cycle 28:" \
            "Implement a pluggable email provider abstraction for the Notifications BC.

          **Deliverables:**
          - \`IEmailProvider\` interface (Send, SendBatch)
          - \`StubEmailProvider\` — logs to console and captures sent emails for tests
          - \`SmtpEmailProvider\` — SMTP-based production implementation
          - DI registration in \`Notifications.Api/Program.cs\`
          - Configuration via \`appsettings.json\` (provider selection)

          **Pattern:** See \`docs/skills/external-service-integration.md\` for strategy pattern approach.

          **Cycle:** 28 — Notifications BC Phase 1"

          # --- C2: Cycle 29 — Promotions BC Phase 1 ---
          echo ""
          echo "=== C2: Creating Cycle 29 planning issues ==="

          create_issue \
            "[Promotions BC] Create domain + API project structure" \
            "bc:promotions,type:feature,status:backlog" \
            "Cycle 29:" \
            "Create the Promotions bounded context:

          - \`src/Promotions/Promotions/\` — domain project
          - \`src/Promotions/Promotions.Api/\` — API project
          - Add both projects to \`CritterSupply.slnx\`
          - Configure Marten document store + Wolverine + RabbitMQ
          - Docker Compose service entry

          **Cycle:** 29 — Promotions BC Phase 1
          **Prerequisite:** Cycle 28 (Notifications BC Phase 1)"

          create_issue \
            "[Promotions BC] Implement coupon/discount domain model" \
            "bc:promotions,type:feature,status:backlog" \
            "Cycle 29:" \
            "Design and implement the core Promotions domain model.

          **Deliverables:**
          - \`Coupon\` document (code, discount type, amount/percentage, expiry, usage limits)
          - \`DiscountType\` enum (FixedAmount, Percentage, FreeShipping)
          - Create/update/deactivate coupon CRUD handlers
          - Validation rules (expiry, max uses, minimum order value)

          **Note:** Shopping BC already has \`CouponApplied\`/\`CouponRemoved\` placeholder events.

          **Cycle:** 29 — Promotions BC Phase 1"

          create_issue \
            "[Promotions BC] Shopping BC integration: apply coupon to cart" \
            "bc:shopping,type:feature,status:backlog" \
            "Cycle 29:" \
            "Wire Promotions BC coupon validation into the Shopping BC cart flow.

          **Deliverables:**
          - \`ApplyCoupon\` command → validates against Promotions BC → fires \`CouponApplied\`
          - \`RemoveCoupon\` command → fires \`CouponRemoved\`
          - Cart total recalculation with discount applied
          - Checkout passes discount to Orders BC

          **Note:** Shopping BC already has \`CouponApplied\`/\`CouponRemoved\` placeholder events in the domain.

          **Cycle:** 29 — Promotions BC Phase 1"

          create_issue \
            "[Promotions BC] Write integration tests" \
            "bc:promotions,type:testing,status:backlog" \
            "Cycle 29:" \
            "Integration tests for the Promotions BC using Alba + TestContainers.

          **Test coverage:**
          - Coupon CRUD endpoints
          - Coupon validation (expired, max uses exceeded, minimum order not met)
          - Shopping BC integration: apply/remove coupon with cart total update

          **Cycle:** 29 — Promotions BC Phase 1"

          create_issue \
            "[Admin Portal] Write RBAC ADR before implementation begins" \
            "bc:admin-portal,type:adr,status:backlog" \
            "Cycle 29:" \
            "Author the Role-Based Access Control (RBAC) Architectural Decision Record before any Admin Portal implementation begins.

          **ADR must cover:**
          - Role taxonomy (SuperAdmin, CSAgent, WarehouseOps, etc.)
          - How roles map to Claims in JWT / cookie auth
          - Enforcement strategy (Wolverine policies vs. ASP.NET Core authorization policies)
          - Integration with Vendor Identity BC (shared identity store vs. separate)
          - UI-level RBAC in Blazor (route guards, conditional rendering)

          **Prerequisite for:** Cycle 30+ Admin Portal Phase 1

          **Cycle:** 29 — author during this cycle
          **See:** \`docs/planning/admin-portal-event-modeling.md\`"

      - name: Summary
        run: |
          echo ""
          echo "=== Audit Cleanup Complete ==="
          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN — no changes were made. Re-run with dry_run=false to apply."
          else
            echo "✅ All cleanup actions completed."
            echo ""
            echo "Verify results:"
            echo "  Closed issues : https://github.com/${REPO}/issues?q=is:closed"
            echo "  Milestones    : https://github.com/${REPO}/milestones"
            echo "  New issues    : https://github.com/${REPO}/issues?q=is:open+label:status:planned"
            echo ""
            echo "Next step: Add new Cycle 28/29 issues to GitHub Project 9 board"
          fi
