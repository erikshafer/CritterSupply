            --logger "trx;LogFileName=vendor-e2e-results.trx" \
            -- -parallel none
        env:
          PLAYWRIGHT_HEADLESS: ${{ github.event.inputs.headless || 'true' }}
          DOCKER_HOST: unix:///var/run/docker.sock
          TESTCONTAINERS_RYUK_DISABLED: false

      - name: Upload Vendor Portal test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vendor-portal-e2e-results-${{ github.run_number }}
          path: '**/TestResults/**/*.trx'
          retention-days: 14

      - name: Upload Playwright traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vendor-portal-playwright-traces-${{ github.run_number }}
          path: '**/playwright-traces/**/*.zip'
          retention-days: 7

  # ─── Backoffice E2E Tests ──────────────────────────────────────────────────
  # Blazor WASM: Customer service workflows, order search, return management, pricing admin.
  # Uses real Kestrel (Backoffice.Web + Backoffice.Api + BackofficeIdentity.Api)
  # with TestContainers PostgreSQL.
  backoffice-e2e:
