            install chromium --with-deps

      # Pre-pull the PostgreSQL image used by TestContainers E2E fixtures.
      # This avoids flaky timeouts on slow Docker Hub responses.
      - name: Pre-pull TestContainers PostgreSQL image
        run: docker pull postgres:18-alpine

      # Verify Docker service is healthy before running tests
      - name: Verify Docker service
        run: |
          docker ps
          docker info

      - name: Run Vendor Portal E2E Tests
        run: |
          dotnet test "tests/Vendor Portal/VendorPortal.E2ETests/VendorPortal.E2ETests.csproj" \
            --no-build \
