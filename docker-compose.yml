services:
  # ===== INFRASTRUCTURE SERVICES =====
  postgres:
    container_name: crittersupply-postgres
    image: postgres:latest
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DATABASE: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./docker/postgres/create-databases.sh:/docker-entrypoint-initdb.d/create-databases.sh
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles: [infrastructure, all, ci]

  rabbitmq:
    container_name: crittersupply-rabbitmq
    image: rabbitmq:management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: [infrastructure, all, ci]

  jaeger:
    container_name: crittersupply-jaeger
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - backend
    profiles: [infrastructure, all]

  # ===== BOUNDED CONTEXT APIS =====
  orders-api:
    container_name: crittersupply-orders
    build:
      context: .
      dockerfile: src/Orders/Orders.Api/Dockerfile
    ports:
      - "5231:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__postgres: "Host=postgres;Port=5432;Database=orders;Username=postgres;Password=postgres"
      RabbitMQ__hostname: rabbitmq
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: Orders.Api
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend
    profiles: [all, orders]

  payments-api:
    container_name: crittersupply-payments
    build:
      context: .
      dockerfile: src/Payments/Payments.Api/Dockerfile
    ports:
      - "5232:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__postgres: "Host=postgres;Port=5432;Database=payments;Username=postgres;Password=postgres"
      RabbitMQ__hostname: rabbitmq
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: Payments.Api
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend
    profiles: [all, payments]

  inventory-api:
    container_name: crittersupply-inventory
    build:
      context: .
      dockerfile: src/Inventory/Inventory.Api/Dockerfile
    ports:
      - "5233:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__postgres: "Host=postgres;Port=5432;Database=inventory;Username=postgres;Password=postgres"
      RabbitMQ__hostname: rabbitmq
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: Inventory.Api
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend
    profiles: [all, inventory]

  fulfillment-api:
    container_name: crittersupply-fulfillment
    build:
      context: .
      dockerfile: src/Fulfillment/Fulfillment.Api/Dockerfile
    ports:
      - "5234:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__postgres: "Host=postgres;Port=5432;Database=fulfillment;Username=postgres;Password=postgres"
      RabbitMQ__hostname: rabbitmq
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: Fulfillment.Api
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend
    profiles: [all, fulfillment]

  customeridentity-api:
    container_name: crittersupply-customeridentity
    build:
      context: .
      dockerfile: src/Customer Identity/CustomerIdentity.Api/Dockerfile
    ports:
      - "5235:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__postgres: "Host=postgres;Port=5432;Database=customeridentity;Username=postgres;Password=postgres"
      RabbitMQ__hostname: rabbitmq
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: CustomerIdentity.Api
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend
    profiles: [all, customeridentity]

  shopping-api:
    container_name: crittersupply-shopping
    build:
      context: .
      dockerfile: src/Shopping/Shopping.Api/Dockerfile
    ports:
      - "5236:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__postgres: "Host=postgres;Port=5432;Database=shopping;Username=postgres;Password=postgres"
      RabbitMQ__hostname: rabbitmq
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: Shopping.Api
      Pricing__BaseUrl: http://pricing-api:8080
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      pricing-api:
        condition: service_started
    networks:
      - backend
    profiles: [all, shopping]

  productcatalog-api:
    container_name: crittersupply-catalog
    build:
      context: .
      dockerfile: src/Product Catalog/ProductCatalog.Api/Dockerfile
    ports:
      - "5133:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__postgres: "Host=postgres;Port=5432;Database=productcatalog;Username=postgres;Password=postgres"
      RabbitMQ__hostname: rabbitmq
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: ProductCatalog.Api
      Jwt__SigningKey: "dev-only-signing-key-change-in-production-must-be-at-least-32-chars"
      Jwt__Issuer: "vendor-identity"
      Jwt__Audience: "vendor-portal"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend
    profiles: [all, catalog]

  pricing-api:
    container_name: crittersupply-pricing
    build:
      context: .
      dockerfile: src/Pricing/Pricing.Api/Dockerfile
    ports:
      - "5242:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__postgres: "Host=postgres;Port=5432;Database=pricing;Username=postgres;Password=postgres"
      RabbitMQ__hostname: rabbitmq
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: Pricing.Api
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend
    profiles: [all, pricing]

  returns-api:
    container_name: crittersupply-returns
    build:
      context: .
      dockerfile: src/Returns/Returns.Api/Dockerfile
    ports:
      - "5245:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__postgres: "Host=postgres;Port=5432;Database=returns;Username=postgres;Password=postgres"
      RabbitMQ__hostname: rabbitmq
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: Returns.Api
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend
    profiles: [all, returns]

  listings-api:
    container_name: crittersupply-listings
    build:
      context: .
      dockerfile: src/Listings/Listings.Api/Dockerfile
    ports:
      - "5246:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__postgres: "Host=postgres;Port=5432;Database=listings;Username=postgres;Password=postgres"
      RabbitMQ__hostname: rabbitmq
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: Listings.Api
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend
    profiles: [all, listings]

  vendoridentity-api:
    container_name: crittersupply-vendoridentity
    build:
      context: .
      dockerfile: src/Vendor Identity/VendorIdentity.Api/Dockerfile
    ports:
      - "5240:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__postgres: "Host=postgres;Port=5432;Database=vendoridentity;Username=postgres;Password=postgres"
      RabbitMQ__hostname: rabbitmq
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: VendorIdentity.Api
      Jwt__SigningKey: "dev-only-signing-key-change-in-production-must-be-at-least-32-chars"
      Jwt__Issuer: "vendor-identity"
      Jwt__Audience: "vendor-portal"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend
    profiles: [all, vendor]

  vendorportal-api:
    container_name: crittersupply-vendorportal
    build:
      context: .
      dockerfile: src/Vendor Portal/VendorPortal.Api/Dockerfile
    ports:
      - "5239:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__postgres: "Host=postgres;Port=5432;Database=vendorportal;Username=postgres;Password=postgres"
      RabbitMQ__hostname: rabbitmq
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: VendorPortal.Api
      Jwt__SigningKey: "dev-only-signing-key-change-in-production-must-be-at-least-32-chars"
      Jwt__Issuer: "vendor-identity"
      Jwt__Audience: "vendor-portal"
      ApiClients__VendorIdentityApiUrl: "http://vendoridentity-api:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      vendoridentity-api:
        condition: service_started
    networks:
      - backend
    profiles: [all, vendor]

  vendorportal-web:
    container_name: crittersupply-vendorportal-web
    build:
      context: .
      dockerfile: src/Vendor Portal/VendorPortal.Web/Dockerfile
    ports:
      - "5241:8080"
    depends_on:
      - vendoridentity-api
      - vendorportal-api
    networks:
      - backend
    profiles: [all, vendor]

  storefront-api:
    container_name: crittersupply-storefront-api
    build:
      context: .
      dockerfile: src/Customer Experience/Storefront.Api/Dockerfile
    ports:
      - "5237:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__postgres: "Host=postgres;Port=5432;Database=storefront;Username=postgres;Password=postgres"
      RabbitMQ__hostname: rabbitmq
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: Storefront.Api
      ApiClients__ShoppingApiUrl: http://shopping-api:8080
      ApiClients__OrdersApiUrl: http://orders-api:8080
      ApiClients__CustomerIdentityApiUrl: http://customeridentity-api:8080
      ApiClients__CatalogApiUrl: http://productcatalog-api:8080
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      shopping-api:
        condition: service_started
      orders-api:
        condition: service_started
      customeridentity-api:
        condition: service_started
      productcatalog-api:
        condition: service_started
    networks:
      - backend
    profiles: [all, storefront]

  storefront-web:
    container_name: crittersupply-storefront-web
    build:
      context: .
      dockerfile: src/Customer Experience/Storefront.Web/Dockerfile
    ports:
      - "5238:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ApiClients__ShoppingApiUrl: http://shopping-api:8080
      ApiClients__OrdersApiUrl: http://orders-api:8080
      ApiClients__CatalogApiUrl: http://productcatalog-api:8080
      ApiClients__StorefrontApiUrl: http://storefront-api:8080
      ApiClients__CustomerIdentityApiUrl: http://customeridentity-api:8080
    depends_on:
      - customeridentity-api
      - orders-api
      - shopping-api
      - productcatalog-api
      - storefront-api
    networks:
      - backend
    profiles: [all]

  backofficeidentity-api:
    container_name: crittersupply-backofficeidentity
    build:
      context: .
      dockerfile: src/Backoffice Identity/BackofficeIdentity.Api/Dockerfile
    ports:
      - "5249:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__postgres: "Host=postgres;Port=5432;Database=backofficeidentity;Username=postgres;Password=postgres"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: BackofficeIdentity.Api
      Jwt__SecretKey: "BackofficeIdentity-Development-Secret-Key-Minimum-32-Characters-Required"
      Jwt__Issuer: "http://backofficeidentity-api:8080"
      Jwt__Audience: "http://backofficeidentity-api:8080"
      Jwt__ExpiryMinutes: "15"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    profiles: [all, backofficeidentity, backoffice]

  backoffice-api:
    container_name: crittersupply-backoffice
    build:
      context: .
      dockerfile: src/Backoffice/Backoffice.Api/Dockerfile
    ports:
      - "5243:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__postgres: "Host=postgres;Port=5432;Database=postgres;Username=postgres;Password=postgres"
      RabbitMQ__hostname: rabbitmq
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: Backoffice.Api
      Jwt__Issuer: "http://backofficeidentity-api:8080"
      Jwt__Audience: "backoffice"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      backofficeidentity-api:
        condition: service_started
    networks:
      - backend
    profiles: [all, backoffice]

  backoffice-web:
    container_name: crittersupply-backoffice-web
    build:
      context: .
      dockerfile: src/Backoffice/Backoffice.Web/Dockerfile
    ports:
      - "5244:8080"
    depends_on:
      - backofficeidentity-api
      - backoffice-api
    networks:
      - backend
    profiles: [all, backoffice]

networks:
  backend:
    driver: bridge

volumes:
  postgres:
